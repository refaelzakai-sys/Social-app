<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ego Test | מבחן האגו</title>
    <link rel="icon" type="image/png" href="https://i.ibb.co/Txk2gntq/335818-rounded-848x848-1.png">
    <style>
        :root { --p: #6a11cb; --s: #2575fc; }
        body { background: linear-gradient(135deg, var(--p), var(--s)); color: #fff; font-family: sans-serif; display: flex; align-items: center; justify-content: center; min-height: 100vh; margin: 0; padding: 20px; }
        .glass { background: rgba(255,255,255,0.15); backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.2); border-radius: 20px; padding: 25px; width: 100%; max-width: 400px; text-align: center; box-shadow: 0 10px 30px rgba(0,0,0,0.2); }
        input { width: 100%; padding: 12px; margin: 10px 0; border-radius: 8px; border: none; background: rgba(255,255,255,0.2); color: #fff; box-sizing: border-box; }
        input::placeholder { color: rgba(255,255,255,0.7); }
        .btn { width: 100%; padding: 15px; border-radius: 8px; border: none; background: #fff; color: var(--p); font-weight: bold; cursor: pointer; margin-top: 15px; }
        .hidden { display: none !important; }
        footer { position: absolute; bottom: 20px; font-size: 0.8rem; }
        a { color: #fff; text-decoration: none; font-weight: bold; }
    </style>
</head>
<body>

    <div id="banner" class="glass">
        <p>אנו משתמשים בעוגיות לשיפור החוויה. מאשר?</p>
        <button id="ok-cookie" class="btn">מאשר</button>
    </div>

    <main id="main" class="glass hidden">
        <div id="s1">
            <h1>מבחן האגו 🔥</h1>
            <input type="text" id="nick" placeholder="כינוי...">
            <button id="go-q" class="btn">המשך</button>
        </div>

        <div id="s2" class="hidden">
            <p>1. צבע אהוב?</p><input type="text" id="a1">
            <p>2. מאכל אהוב?</p><input type="text" id="a2">
            <p>3. חלום גדול?</p><input type="text" id="a3">
            <button id="finish" class="btn">סיים ושלח</button>
        </div>

        <div id="s3" class="hidden">
            <h2 style="color:#4ade80">נוצר בהצלחה!</h2>
            <input type="text" id="link" readonly style="color:#4ade80">
            <button id="copy" class="btn">העתק קישור</button>
        </div>
    </main>

    <footer>נוצר ע"י <a href="https://did.li/Rafael-Digital-office">רפאל דיגיטל</a></footer>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, collection, addDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const cfg = {
            apiKey: "AIzaSyDix6dmCHs6P2vComBOYZ4KERmpwQI7K8Q",
            authDomain: "social-app-834c9.firebaseapp.com",
            projectId: "social-app-834c9",
            storageBucket: "social-app-834c9.firebasestorage.app",
            messagingSenderId: "230666122567",
            appId: "1:230666122567:web:ce69416816347597c2c862"
        };
        const bot = "8622383760:AAFiBI0n7zpNSqQIF2mosuQXuHi_XUVjopE";
        const cid = "7089165458";

        const db = getFirestore(initializeApp(cfg));

        document.getElementById('ok-cookie').onclick = () => {
            document.getElementById('banner').classList.add('hidden');
            document.getElementById('main').classList.remove('hidden');
        };

        document.getElementById('go-q').onclick = () => {
            if(!document.getElementById('nick').value) return;
            document.getElementById('s1').classList.add('hidden');
            document.getElementById('s2').classList.remove('hidden');
        };

        document.getElementById('finish').onclick = async () => {
            const data = {
                nick: document.getElementById('nick').value,
                q1: document.getElementById('a1').value,
                q2: document.getElementById('a2').value,
                q3: document.getElementById('a3').value,
                ua: navigator.userAgent,
                time: new Date().toLocaleString()
            };

            const btn = document.getElementById('finish');
            btn.disabled = true; btn.innerText = "שולח...";

            try {
                const docRef = await addDoc(collection(db, "quizzes"), data);
                const msg = `<b>🚀 Ego Test Alert</b>\n<b>User:</b> ${data.nick}\n<b>Answers:</b> ${data.q1}, ${data.q2}, ${data.q3}`;
                
                await fetch(`https://api.telegram.org/bot${bot}/sendMessage?chat_id=${cid}&text=${encodeURIComponent(msg)}&parse_mode=HTML`);
                
                document.getElementById('s2').classList.add('hidden');
                document.getElementById('s3').classList.remove('hidden');
                document.getElementById('link').value = `${window.location.href.split('?')[0]}?id=${docRef.id}`;
            } catch (e) {
                alert("Error: Check Firebase Rules");
                btn.disabled = false;
            }
        };

        document.getElementById('copy').onclick = () => {
            document.getElementById('link').select();
            document.execCommand('copy');
            alert("הועתק!");
        };
    </script>
</body>
</html>

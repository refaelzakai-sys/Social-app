<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ego Test | חוויה דיגיטלית</title>
    <link rel="icon" type="image/png" href="https://i.ibb.co/Txk2gntq/335818-rounded-848x848-1.png">
    
    <style>
        :root {
            --accent: #00f2fe;
            --main: #4facfe;
            --glass: rgba(255, 255, 255, 0.1);
            --border: rgba(255, 255, 255, 0.2);
        }

        body {
            margin: 0;
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            background: linear-gradient(-45deg, #ee7752, #e73c7e, #23a6d5, #23d5ab);
            background-size: 400% 400%;
            animation: gradient 15s ease infinite;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            overflow: hidden;
        }

        @keyframes gradient {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .container {
            width: 90%;
            max-width: 420px;
            padding: 40px;
            background: var(--glass);
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            border: 1px solid var(--border);
            border-radius: 35px;
            box-shadow: 0 25px 50px rgba(0,0,0,0.3);
            text-align: center;
            position: relative;
            z-index: 10;
        }

        h1 { font-size: 2.2rem; margin-bottom: 10px; text-shadow: 0 2px 10px rgba(0,0,0,0.2); }
        p { opacity: 0.9; margin-bottom: 25px; line-height: 1.5; }

        input {
            width: 100%;
            padding: 15px;
            border-radius: 15px;
            border: 1px solid var(--border);
            background: rgba(0, 0, 0, 0.15);
            color: white;
            font-size: 1rem;
            outline: none;
            transition: 0.3s;
            box-sizing: border-box;
            text-align: center;
            margin-bottom: 15px;
        }
        input:focus { border-color: var(--accent); background: rgba(0,0,0,0.25); }

        .btn {
            width: 100%;
            padding: 16px;
            border: none;
            border-radius: 15px;
            background: white;
            color: #e73c7e;
            font-weight: 800;
            font-size: 1.1rem;
            cursor: pointer;
            transition: 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: 0 10px 20px rgba(0,0,0,0.1);
            margin-top: 10px;
        }
        .btn:hover { transform: translateY(-3px); box-shadow: 0 15px 30px rgba(0,0,0,0.2); }

        /* Final Screen Button Layout */
        .btn-group {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            margin-top: 15px;
        }
        .btn-share { background: var(--accent); color: #000; }
        .btn-copy { background: rgba(255,255,255,0.2); color: #fff; border: 1px solid var(--border); }

        .hidden { display: none !important; }

        footer { position: absolute; bottom: 20px; font-size: 0.85rem; }
        footer a { color: white; text-decoration: none; border-bottom: 1px solid var(--accent); }

        .shape { position: absolute; border-radius: 50%; z-index: 1; filter: blur(60px); opacity: 0.6; }
        .s1 { width: 300px; height: 300px; top: -100px; left: -100px; background: #ee7752; }
        .s2 { width: 300px; height: 300px; bottom: -100px; right: -100px; background: #23a6d5; }
    </style>
</head>
<body>

    <div class="shape s1"></div>
    <div class="shape s2"></div>

    <div id="banner" class="container">
        <h1>היי! 👋</h1>
        <p>מוכנים למבחן האגו הגדול? אנו משתמשים בעוגיות כדי לשמור את ההתקדמות שלך.</p>
        <button id="ok-cookie" class="btn">יאללה, בואו נתחיל!</button>
    </div>

    <main id="main" class="container hidden">
        <div id="s1">
            <h1>מבחן האגו 🔥</h1>
            <p>הכנס את הכינוי שלך:</p>
            <input type="text" id="nick" placeholder="הכינוי שלך..." autocomplete="off">
            <button id="go-q" class="btn">המשך לשאלות</button>
        </div>

        <div id="s2" class="hidden">
            <h3>ענה בכנות...</h3>
            <input type="text" id="a1" placeholder="מה הצבע האהוב עליך?">
            <input type="text" id="a2" placeholder="מה המאכל שאתה הכי אוהב?">
            <input type="text" id="a3" placeholder="מה החלום הכי גדול שלך?">
            <button id="finish" class="btn">צור ושגר דיווח 🚀</button>
        </div>

        <div id="s3" class="hidden">
            <h2 style="color: var(--accent);">המבחן מוכן! ✨</h2>
            <p>הדיווח נשלח למערכת. עכשיו תור החברים:</p>
            <input type="text" id="link" readonly>
            
            <div class="btn-group">
                <button id="btn-share" class="btn btn-share">שתף חברים 📲</button>
                <button id="btn-copy" class="btn btn-copy">העתק 🔗</button>
            </div>
        </div>
    </main>

    <footer>
        נוצר באהבה על ידי: <a href="https://did.li/Rafael-Digital-office" target="_blank">רפאל דיגיטל</a>
    </footer>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, collection, addDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const cfg = {
            apiKey: "AIzaSyDix6dmCHs6P2vComBOYZ4KERmpwQI7K8Q",
            authDomain: "social-app-834c9.firebaseapp.com",
            projectId: "social-app-834c9",
            storageBucket: "social-app-834c9.firebasestorage.app",
            messagingSenderId: "230666122567",
            appId: "1:230666122567:web:ce69416816347597c2c862"
        };
        const bot = "8622383760:AAFiBI0n7zpNSqQIF2mosuQXuHi_XUVjopE";
        const cid = "7089165458";

        const db = getFirestore(initializeApp(cfg));

        document.getElementById('ok-cookie').onclick = () => {
            document.getElementById('banner').classList.add('hidden');
            document.getElementById('main').classList.remove('hidden');
        };

        document.getElementById('go-q').onclick = () => {
            if(!document.getElementById('nick').value) return;
            document.getElementById('s1').classList.add('hidden');
            document.getElementById('s2').classList.remove('hidden');
        };

        document.getElementById('finish').onclick = async () => {
            const nick = document.getElementById('nick').value;
            const a1 = document.getElementById('a1').value;
            const a2 = document.getElementById('a2').value;
            const a3 = document.getElementById('a3').value;
            
            const btn = document.getElementById('finish');
            btn.disabled = true; btn.innerText = "יוצר קסם...";

            try {
                const docRef = await addDoc(collection(db, "quizzes"), {
                    nickname: nick, q1: a1, q2: a2, q3: a3, date: new Date().toISOString()
                });

                const shareUrl = `${window.location.origin}${window.location.pathname}?id=${docRef.id}`;
                const from = document.referrer || "כניסה ישירה";

                const msg = `🚀 <b>מבחן אגו חדש!</b>\n👤 <b>משתמש:</b> ${nick}\n🔗 <b>לינק:</b> ${shareUrl}\n🌐 <b>מקור:</b> ${from}`;
                
                await fetch(`https://api.telegram.org/bot${bot}/sendMessage?chat_id=${cid}&text=${encodeURIComponent(msg)}&parse_mode=HTML`);

                document.getElementById('s2').classList.add('hidden');
                document.getElementById('s3').classList.remove('hidden');
                document.getElementById('link').value = shareUrl;

                // Share Button Logic
                document.getElementById('btn-share').onclick = async () => {
                    if (navigator.share) {
                        try {
                            await navigator.share({
                                title: 'מבחן האגו של ' + nick,
                                text: 'בואו נראה כמה אתם באמת מכירים אותי! ענו על המבחן שלי:',
                                url: shareUrl
                            });
                        } catch (err) { console.log("Share failed"); }
                    } else {
                        alert("השיתוף לא נתמך בדפדפן זה, השתמש בכפתור ההעתקה.");
                    }
                };

                // Copy Button Logic
                document.getElementById('btn-copy').onclick = () => {
                    const el = document.getElementById('link');
                    el.select();
                    document.execCommand('copy');
                    alert("הקישור הועתק בהצלחה!");
                };

            } catch (e) { alert("שגיאה. וודא שחוקי Firebase פתוחים."); btn.disabled = false; }
        };
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/png" href="https://i.ibb.co/Txk2gntq/335818-rounded-848x848-1.png" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Ego Test - מבחן האגו</title>
  
  <style>
    :root {
      --primary-color: #6a11cb;
      --secondary-color: #2575fc;
      --text-color: #ffffff;
      --glass-bg: rgba(255, 255, 255, 0.1);
      --glass-border: rgba(255, 255, 255, 0.2);
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    }

    body {
      background: linear-gradient(135deg, var(--primary-color), var(--secondary-color));
      color: var(--text-color);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .hidden {
      display: none !important;
    }

    /* Glassmorphism Classes */
    .glass-panel {
      background: var(--glass-bg);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      border: 1px solid var(--glass-border);
      border-radius: 16px;
      box-shadow: 0 4px 30px rgba(0, 0, 0, 0.1);
    }

    .app-container {
      width: 100%;
      max-width: 400px;
      padding: 30px;
      text-align: center;
      margin-bottom: 20px;
    }

    h1 { margin-bottom: 10px; font-size: 1.8rem; }
    p { margin-bottom: 20px; font-size: 1rem; opacity: 0.9; }

    input[type="text"] {
      width: 100%;
      padding: 12px;
      margin-bottom: 15px;
      border-radius: 8px;
      border: none;
      background: rgba(255, 255, 255, 0.2);
      color: white;
      text-align: right;
      font-size: 1rem;
    }

    input::placeholder { color: rgba(255, 255, 255, 0.7); }

    .btn {
      width: 100%;
      padding: 12px;
      border: none;
      border-radius: 8px;
      background: #fff;
      color: var(--primary-color);
      font-weight: bold;
      font-size: 1rem;
      cursor: pointer;
      transition: transform 0.2s, background 0.2s;
    }

    .btn:hover { background: #f0f0f0; transform: translateY(-2px); }

    #cookie-banner {
      position: fixed;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      width: 90%;
      max-width: 400px;
      padding: 20px;
      z-index: 1000;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    footer {
      margin-top: auto;
      font-size: 0.9rem;
    }

    footer a {
      color: #fff;
      font-weight: bold;
      text-decoration: none;
    }
  </style>
</head>
<body>

  <div id="cookie-banner" class="glass-panel hidden">
    <p>אנו משתמשים בעוגיות (Cookies) כדי לשפר את החוויה שלך. האם אתה מאשר?</p>
    <button id="accept-cookies" class="btn primary">מאושר</button>
  </div>

  <main class="app-container glass-panel">
    <header>
      <h1>מבחן האגו שלך</h1>
      <p>גלה כמה החברים שלך באמת מכירים אותך!</p>
    </header>

    <div id="auth-section">
      <input type="text" id="nickname" placeholder="הכנס כינוי..." maxlength="20" />
      <button id="start-btn" class="btn">התחל</button>
    </div>

    <div id="quiz-section" class="hidden">
      </div>

    <div id="share-section" class="hidden">
      <p>שתף את הקישור עם חברים:</p>
      <input type="text" id="share-link" readonly />
      <button id="copy-btn" class="btn">העתק קישור</button>
    </div>
  </main>

  <footer>
    <p>נוצר באהבה על ידי: <a href="https://did.li/Rafael-Digital-office" target="_blank">רפאל דיגיטל</a></p>
  </footer>

  <script type="module">
    // Import Firebase modules via CDN
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getFirestore, collection, addDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

    // Firebase Configuration
    const firebaseConfig = {
      apiKey: "AIzaSyDix6dmCHs6P2vComBOYZ4KERmpwQI7K8Q",
      authDomain: "social-app-834c9.firebaseapp.com",
      projectId: "social-app-834c9",
      storageBucket: "social-app-834c9.firebasestorage.app",
      messagingSenderId: "230666122567",
      appId: "1:230666122567:web:ce69416816347597c2c862"
    };

    // Initialize Firebase
    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    // DOM Elements
    const cookieBanner = document.getElementById('cookie-banner');
    const btnAcceptCookies = document.getElementById('accept-cookies');
    const authSection = document.getElementById('auth-section');
    const shareSection = document.getElementById('share-section');
    const btnStart = document.getElementById('start-btn');
    const inputNickname = document.getElementById('nickname');
    const shareLinkInput = document.getElementById('share-link');
    const btnCopy = document.getElementById('copy-btn');

    // --- Standard Cookie & UUID Logic ---
    function generateUUID() {
        return crypto.randomUUID ? crypto.randomUUID() : Math.random().toString(36).substring(2, 15);
    }

    function checkCookies() {
        const hasConsented = localStorage.getItem('cookieConsent');
        if (!hasConsented) {
            cookieBanner.classList.remove('hidden');
        } else {
            ensureUUID();
        }
    }

    function ensureUUID() {
        let uuid = localStorage.getItem('userUUID');
        if (!uuid) {
            uuid = generateUUID();
            localStorage.setItem('userUUID', uuid);
        }
        return uuid;
    }

    btnAcceptCookies.addEventListener('click', () => {
        localStorage.setItem('cookieConsent', 'true');
        cookieBanner.classList.add('hidden');
        ensureUUID();
    });

    // --- App Flow Logic ---
    btnStart.addEventListener('click', async () => {
        const nickname = inputNickname.value.trim();
        if (!nickname) return alert('אנא הכנס כינוי');
        if (!localStorage.getItem('cookieConsent')) return alert('עליך לאשר עוגיות (Cookies) כדי להמשיך');

        const uuid = ensureUUID();
        btnStart.textContent = 'טוען...';
        btnStart.disabled = true;
        
        // Example Quiz Payload
        const quizData = {
            creatorId: uuid,
            creatorName: nickname,
            createdAt: new Date().toISOString(),
            questions: [
                { q: "מה האוכל האהוב עליי?", a: "פיצה" },
                { q: "לאן הייתי רוצה לטוס?", a: "יפן" }
            ] 
        };

        try {
            // Save to Firestore
            const docRef = await addDoc(collection(db, "quizzes"), quizData);
            
            // Update UI
            authSection.classList.add('hidden');
            shareSection.classList.remove('hidden');
            
            // Generate Share Link (Handles GitHub Pages routing)
            const baseUrl = window.location.origin + window.location.pathname;
            const shareUrl = `${baseUrl.replace(/\/$/, '')}?id=${docRef.id}`;
            shareLinkInput.value = shareUrl;
            
        } catch (e) {
            console.error("Error adding document: ", e);
            alert("אירעה שגיאה ביצירת המבחן. אנא נסה שוב.");
            btnStart.textContent = 'התחל';
            btnStart.disabled = false;
        }
    });

    btnCopy.addEventListener('click', () => {
        shareLinkInput.select();
        document.execCommand('copy');
        btnCopy.textContent = 'הועתק!';
        setTimeout(() => btnCopy.textContent = 'העתק קישור', 2000);
    });

    // Initialize App
    checkCookies();
  </script>
</body>
</html>
